# -----------------------------------------------------------------------------
# LOCAL DEVELOPMENT ONLY (BACKEND-ONLY COMPOSE)
#
# Production direction:
#   - Backend container image -> ECR -> ECS (Fargate)
#   - Frontend React static build -> S3 (+ CloudFront recommended)
#   - MongoDB -> Atlas (do not run Mongo in ECS)
# -----------------------------------------------------------------------------

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: adflow_server
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      # Point to local mongo for development; override with Atlas URI for ECS.
      MONGODB_URI: mongodb://mongo:27017/adflow
      JWT_SECRET: local_dev_secret_at_least_32_characters_long
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CLIENT_URL: http://localhost:5173
      # Leave blank locally; set these in ECS Task Definition / Secrets Manager.
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
      AWS_REGION: us-east-1
      AWS_S3_BUCKET: ""
      CRON_SECRET: local_cron_secret
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: adflow_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
